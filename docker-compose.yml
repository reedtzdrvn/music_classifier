services:
  # Сервис инференса (роль «модельного сервера»): загружает CNN и AST,
  # считает предсказания, спектрограмму и Grad-CAM. Модели монтируются с хоста.
  inference:
    build: ./inference
    container_name: genre-inference
    environment:
      MODELS_DIR: /models
      MAX_WINDOWS: "24"
    volumes:
      # Веса лежат в репозитории (models/, через Git LFS). При необходимости
      # путь можно переопределить через .env: MODELS_HOST_PATH=/другой/путь
      - ${MODELS_HOST_PATH:-./models}:/models:ro
    expose:
      - "9000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:9000/health').status==200 else 1)"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  # Backend-шлюз (FastAPI): приём загрузок, валидация, проксирование на inference.
  backend:
    build: ./backend
    container_name: genre-backend
    environment:
      INFERENCE_URL: http://inference:9000
      MAX_UPLOAD_MB: "30"
      INFERENCE_TIMEOUT: "180"
    expose:
      - "8000"
    ports:
      - "8000:8000"          # доступ к API напрямую (Swagger: http://localhost:8000/docs)
    depends_on:
      inference:
        condition: service_healthy
    restart: unless-stopped

  # Frontend (React, собранный и раздаваемый nginx). Проксирует /api на backend.
  frontend:
    build: ./frontend
    container_name: genre-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
